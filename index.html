<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gushwork Final</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header id="header">Gushwork</header>

<section class="hero fade-in">
<div class="hero-wrapper">
<div class="hero-image">
<img id="mainImage" src="https://images.unsplash.com/photo-1581091215367-59ab6b2e1a3a?q=80&w=1200">
</div>
<div class="hero-content">
<h1>Premium HDPE Pipes</h1>
<p>High quality industrial pipes</p>
<button class="btn-primary">Get Quote</button>
</div>
</div>
</section>

<section class="features fade-in">
<h2>Features</h2>
<div class="grid">
<div class="card">Durable</div>
<div class="card">Flexible</div>
<div class="card">Strong</div>
</div>
</section>

<section class="carousel fade-in">
<h2>Showcase</h2>
<div class="carousel-track">
<div class="carousel-card">1</div>
<div class="carousel-card">2</div>
<div class="carousel-card">3</div>
<div class="carousel-card">4</div>
</div>
</section>

<section class="onboarding fade-in">
<h2>Select Role</h2>
<div class="roles">
<button class="role">Dev</button>
<button class="role">Design</button>
</div>
<button id="continueBtn" disabled>Continue</button>
</section>

<script src="script.js"></script>
</body>
</html>
